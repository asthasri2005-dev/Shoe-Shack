<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoe Store</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="Shoes/main-logo.png" alt="Logo">
      </a>
    </div>
  </nav>

  <!-- Carousel -->
  <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">

      <div class="carousel-item active">
        <div class="row">
          <div class="col-lg-6">
            <img src="Shoes/card-item1.jpg" class="d-block w-100">
          </div>
          <div class="col-lg-6">
            <img src="Shoes/card-item2.jpg" class="d-block w-100">
          </div>
          <div class="col-lg-6">
            <img src="Shoes/card-item3.jpg" class="d-block w-100">
          </div>
          <div class="col-lg-6">
            <img src="Shoes/card-item4.jpg" class="d-block w-100">
          </div>
        </div>
      </div>

      <div class="carousel-item">
        <div class="row">
          <div class="col-lg-6">
            <img src="Shoes/card-item5.jpg" class="d-block w-100">
          </div>
          <div class="col-lg-6">
            <img src="Shoes/card-item6.jpg" class="d-block w-100">
          </div>
          <div class="col-lg-6">
            <img src="Shoes/card-item7.jpg" class="d-block w-100">
          </div>
          <div class="col-lg-6">
            <img src="Shoes/card-item8.jpg" class="d-block w-100">
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Featured Products -->
  <div class="container py-5">
    <div class="row">

      <div class="col-md-3">
        <img src="Shoes/collection-item1.jpg" class="img-fluid">
      </div>

      <div class="col-md-3">
        <img src="Shoes/collection-item2.jpg" class="img-fluid">
      </div>

      <div class="col-md-3">
        <img src="Shoes/card-item5.jpg" class="img-fluid">
      </div>

      <div class="col-md-3">
        <img src="Shoes/card-image3.jpg" class="img-fluid">
      </div>

    </div>
  </div>

  <!-- Latest Products -->
  <div class="container">
    <div class="row">

      <div class="col-md-4">
        <img src="Shoes/collection-item2.jpg" class="img-fluid">
      </div>

      <div class="col-md-4">
        <img src="Shoes/collection-item1.jpg" class="img-fluid">
      </div>

      <div class="col-md-4">
        <img src="Shoes/single-product-thumb1.jpg" class="img-fluid">
      </div>

      <div class="col-md-4">
        <img src="Shoes/single-product-thumb2.jpg" class="img-fluid">
      </div>

      <div class="col-md-4">
        <img src="Shoes/card-image3.jpg" class="img-fluid">
      </div>

      <div class="col-md-4">
        <img src="Shoes/card-image1.jpg" class="img-fluid">
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
